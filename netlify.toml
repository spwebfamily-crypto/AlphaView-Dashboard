[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = "/api/v1"
  VITE_APP_MODE = "PAPER"

[[redirects]]
  from = "/api/*"
  to = "https://alphaview-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
